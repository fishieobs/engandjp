    keyPoints:[{ja:"",en:"Could I get...?",note:"請空服員提供東西的禮貌說法"},{ja:"",en:"Still or sparkling?",note:"still = 無氣泡；sparkling = 氣泡水"},{ja:"",en:"Aisle seat / Window seat",note:"aisle 發音 /aɪl/，不發 s"}],
    tags:["English","travel","airplane"]},
  { id:2, date:"2026-06-06", topic:"Supermarket Shopping", topicJa:"超市購物", category:"Shopping", lang:"EN",
    lines:[{sp:"You",ja:"",en:"Excuse me, where can I find the dairy section?"},{sp:"Staff",ja:"",en:"It's in aisle 4, on your left."},{sp:"You",ja:"",en:"Thank you! Is there an ATM nearby?"},{sp:"Staff",ja:"",en:"Yes, there's one right by the entrance."},{sp:"Staff",ja:"",en:"Did you find everything you were looking for?"},{sp:"You",ja:"",en:"Yes, thanks. I'll pay cash for these."}],
    keyPoints:[{ja:"",en:"I'll pay cash for these.",note:"'I'll take cash to these stuff' ❌"},{ja:"",en:"Is there an ATM nearby?",note:"詢問附近設施"},{ja:"",en:"Did you find everything you were looking for?",note:"結帳時店員常用語"}],
    tags:["English","shopping","daily life"]},
  { id:1, date:"2026-06-06", topic:"Ordering at McDonald's", topicJa:"麥當勞點餐", category:"Restaurant", lang:"EN",
    lines:[{sp:"Staff",ja:"",en:"Hi, welcome to McDonald's! What can I get for you?"},{sp:"You",ja:"",en:"I'd like a Big Mac and a large Coke, please."},{sp:"Staff",ja:"",en:"Would you like fries with that?"},{sp:"You",ja:"",en:"Yes, please. Large fries."},{sp:"Staff",ja:"",en:"For here or to go?"},{sp:"You",ja:"",en:"To go, please."},{sp:"Staff",ja:"",en:"That'll be $8.50. How would you like to pay?"},{sp:"You",ja:"",en:"By card, please."}],
    keyPoints:[{ja:"",en:"I'd like... / Could I get...?",note:"點餐最自然的說法"},{ja:"",en:"For here or to go?",note:"內用或外帶；英式：eat in / take away"},{ja:"",en:"fries ≠ rice",note:"曾混淆，注意發音差異"}],
    tags:["English","restaurant","ordering"]},
];

const CATS = ["All","Restaurant","Travel","Business","Medical","Shopping","Daily Life"];
const CC = {Restaurant:"#E8895A",Travel:"#5BAE95",Business:"#6B8FC4",Medical:"#B86896",Shopping:"#7BAE45","Daily Life":"#B8A830"};
const CB = {Restaurant:"#FEF0E8",Travel:"#E8F5F1",Business:"#EBF0F9",Medical:"#F8EDF4",Shopping:"#EFF6E5","Daily Life":"#F8F4E2"};
const SK = "dj-v3";

function fmt(d){return new Date(d).toLocaleDateString("zh-TW",{year:"numeric",month:"short",day:"numeric"});}

function exportPDF(entries,lang){
  const list=lang==="ALL"?entries:entries.filter(e=>e.lang===lang);
  const rows=list.map(e=>`<div class="e"><div class="eh"><b>${e.topicJa||e.topic}</b>${e.topicJa?" / "+e.topic:""}<br><small>${e.category} · ${fmt(e.date)}</small></div><table>${e.lines.filter(l=>l.ja||l.en).map(l=>`<tr>${l.sp?`<td class="sp">${l.sp}</td>`:""} ${l.ja?`<td class="ja">${l.ja}</td>`:""}<td class="en">${l.en}</td></tr>`).join("")}</table><div class="kt">重點句型</div><table class="kp">${e.keyPoints.map(k=>`<tr>${k.ja?`<td class="kj">${k.ja}</td>`:""}<td class="ke">${k.en}</td><td class="kn">${k.note}</td></tr>`).join("")}</table></div>`).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>日英 Dialogue Journal</title><style>body{font-family:'Noto Serif TC',Georgia,serif;margin:32px;color:#222;font-size:13px}h1{font-size:18px;border-bottom:2px solid #c8a87c;padding-bottom:5px;margin-bottom:3px}.sub{color:#888;font-size:11px;margin-bottom:24px}.e{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid #e8e0d0;break-inside:avoid}.eh{margin-bottom:8px;font-size:14px}small{font-size:10px;color:#999}table{width:100%;border-collapse:collapse;margin-bottom:10px}td{padding:4px 7px;vertical-align:top}.e tr:nth-child(odd) td{background:#faf8f5}.sp{width:44px;color:#999;font-size:10px}.ja{width:44%;color:#333}.en{color:#1a6b5a}.kt{font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}.kp td{font-size:12px;border-top:1px solid #f0ebe3}.kj{width:20%;color:#c87c3a;font-weight:600}.ke{width:28%;color:#1a6b5a}.kn{color:#666}@media print{body{margin:16px}}</style></head><body><h1>日英 Dialogue Journal</h1><div class="sub">匯出：${new Date().toLocaleString("zh-TW")} · 共 ${list.length} 個情境</div>${rows}</body></html>`;
  const b=new Blob([html],{type:"text/html"});
  const u=URL.createObjectURL(b);
  const w=window.open(u,"_blank");
  if(w) w.onload=()=>w.print();
}

function App(){
  const [entries,setEntries]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("list");
  const [sel,setSel]=useState(null);
  const [fCat,setFCat]=useState("All");
  const [fLang,setFLang]=useState("ALL");
  const [q,setQ]=useState("");
  const [saveSt,setSaveSt]=useState(null);
  const [pdfMenu,setPdfMenu]=useState(false);
  const [study,setStudy]=useState("all");
  const [rev,setRev]=useState({});
  const [ai,setAi]=useState(null);
  const [aiLoad,setAiLoad]=useState(false);
  const [form,setForm]=useState({topic:"",topicJa:"",date:new Date().toISOString().split("T")[0],category:"Daily Life",lang:"EN",lines:[{sp:"",ja:"",en:""}],keyPoints:[{ja:"",en:"",note:""}],tags:""});

  useEffect(()=>{
    try{const s=localStorage.getItem(SK);setEntries(s?JSON.parse(s):SAMPLE_ENTRIES);}
    catch{setEntries(SAMPLE_ENTRIES);}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    setSaveSt("saving");
    try{localStorage.setItem(SK,JSON.stringify(entries));setSaveSt("saved");setTimeout(()=>setSaveSt(null),2000);}
    catch{setSaveSt("error");setTimeout(()=>setSaveSt(null),3000);}
  },[entries,loaded]);

  const list=entries.filter(e=>{
    const mc=fCat==="All"||e.category===fCat;
    const ml=fLang==="ALL"||e.lang===fLang;
    const ms=!q||e.topic.toLowerCase().includes(q.toLowerCase())||(e.topicJa||"").includes(q)||(e.tags||[]).some(t=>t.includes(q.toLowerCase()));
    return mc&&ml&&ms;
  });

  async function runAI(entry){
    setAiLoad(true);setAi(null);
    try{
      const isJA=entry.lang==="JA";
      const dlg=entry.lines.filter(l=>l.ja||l.en).map((l,i)=>`${i+1}. ${l.ja||""} / ${l.en}`).join("\n");
      const prompt=`你是${isJA?"日語":"英語"}老師，用繁體中文分析以下對話，只回傳JSON不加markdown：\n{"level":"${isJA?"N5/N4/N3/N2/N1":"A1/A2/B1/B2/C1"}","mainGrammar":["文法1","文法2"],"culturalNotes":"文化背景","studyTips":["建議1","建議2"],"difficulty":3}\n主題: ${entry.topic}\n${dlg}`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const txt=data.content?.find(b=>b.type==="text")?.text||"{}";
      setAi(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setAi({error:`分析失敗：${e.message}`});}
    setAiLoad(false);
  }

  function addEntry(){
    setEntries(p=>[{...form,id:Date.now(),tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean)},...p]);
    setView("list");
    setForm({topic:"",topicJa:"",date:new Date().toISOString().split("T")[0],category:"Daily Life",lang:"EN",lines:[{sp:"",ja:"",en:""}],keyPoints:[{ja:"",en:"",note:""}],tags:""});
  }

  function open(e){setSel(e);setView("detail");setAi(null);}
  function back(){setView("list");setSel(null);setAi(null);}
  function toggle(k){setRev(p=>({...p,[k]:!p[k]}));}

  if(!loaded)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#999",fontSize:14}},"載入中…");

  return (
    <div>
      {/* HEADER */}
      <header style={{background:"#fff",borderBottom:"1px solid #ECEAE4",position:"sticky",top:0,zIndex:200,boxShadow:"0 1px 0 #ECEAE4"}}>
        <div className="app-wrap" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10}}>
            <span style={{fontSize:20,fontWeight:700,letterSpacing:"-0.5px"}}>日英</span>
            <span style={{fontSize:11,color:"#bbb",letterSpacing:2,textTransform:"uppercase"}}>Dialogue Journal</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {view!=="list"
              ? <button className="back-btn" onClick={back}>← 返回</button>
              : <>
                  <div style={{position:"relative"}}>
                    <button onClick={()=>setPdfMenu(p=>!p)} className="hdr-btn" style={{background:"#F7F5F0",color:"#666",border:"1px solid #E0DDD6"}}>PDF</button>
                    {pdfMenu&&<div className="pdf-dropdown">
                      {[["ALL","全部"],["EN","英語"],["JA","日語"]].map(([v,l])=>(
                        <div key={v} className="pdf-option" onClick={()=>{exportPDF(entries,v);setPdfMenu(false)}}>{l}情境</div>
                      ))}
                    </div>}
                  </div>
                  <button onClick={()=>setView("study")} className="hdr-btn" style={{background:"#EBF4F1",color:"#2E7D6A",border:"1px solid #C8E4DC"}}>練習</button>
                  <button onClick={()=>setView("add")} className="hdr-btn" style={{background:"#1A1A1A",color:"#fff",border:"none"}}>+ 新增</button>
                </>
            }
          </div>
        </div>
        {saveSt&&<div style={{textAlign:"center",fontSize:11,padding:"3px 0",background:saveSt==="saved"?"#EBF4F1":saveSt==="error"?"#FDEEEE":"#F7F5F0",color:saveSt==="saved"?"#2E7D6A":saveSt==="error"?"#C04040":"#bbb"}}>
          {saveSt==="saving"?"儲存中…":saveSt==="saved"?"✓ 已儲存":"儲存失敗"}
        </div>}
      </header>

      <div className="app-wrap" style={{paddingTop:20,paddingBottom:80}}>

        {/* LIST */}
        {view==="list"&&<>
          <input className="inp" value={q} onChange={e=>setQ(e.target.value)} placeholder="搜尋主題或標籤…" style={{marginBottom:14}}/>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            {[["ALL","全部"],["EN","英語"],["JA","日語"]].map(([v,l])=>(
              <button key={v} className={"filter-pill"+(fLang===v?" active":"")} onClick={()=>setFLang(v)}>{l}</button>
            ))}
            <span style={{flex:1}}/>
            <span style={{fontSize:11,color:"#bbb"}}>{list.length} 個</span>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {CATS.map(c=><button key={c} className="cat-pill" onClick={()=>setFCat(c)} style={{background:fCat===c?(CC[c]||"#1A1A1A"):(CB[c]||"#F0EDEA"),color:fCat===c?"#fff":(CC[c]||"#666"),fontWeight:fCat===c?700:400}}>{c}</button>)}
          </div>
          <div className="grid-3" style={{marginBottom:20}}>
            {[{l:"英語",v:entries.filter(e=>e.lang==="EN").length},{l:"日語",v:entries.filter(e=>e.lang==="JA").length},{l:"累積句型",v:entries.reduce((a,e)=>a+e.keyPoints.length,0)}].map(s=>(
              <div key={s.l} className="stat-box"><div className="stat-num">{s.v}</div><div className="stat-label">{s.l}</div></div>
            ))}
          </div>
          <div className="entry-grid">
            {list.map(e=>(
              <div key={e.id} className="entry-card" style={{borderTopColor:CC[e.category]||"#ddd"}} onClick={()=>open(e)}>
                <div style={{marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:15,fontWeight:700}}>{e.topicJa||e.topic}</span>
                    <span className="lang-badge" style={{background:e.lang==="EN"?"#EBF4F1":"#FEF0E8",color:e.lang==="EN"?"#2E7D6A":"#C87030"}}>{e.lang}</span>
                  </div>
                  {e.topicJa&&<div style={{fontSize:12,color:"#999",marginTop:2}}>{e.topic}</div>}
                </div>
                <div style={{fontSize:11,color:"#bbb",marginBottom:8}}>{fmt(e.date)}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  <span className="cat-pill" style={{background:CB[e.category]||"#F0EDEA",color:CC[e.category]||"#888",fontSize:10,padding:"2px 8px"}}>{e.category}</span>
                  {(e.tags||[]).slice(0,3).map(t=><span key={t} className="tag">#{t}</span>)}
                </div>
                <div style={{marginTop:10,fontSize:11,color:"#bbb"}}>{e.lines.filter(l=>l.ja||l.en).length} lines · {e.keyPoints.length} key points</div>
              </div>
            ))}
          </div>
          {list.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#bbb",fontSize:14}}>找不到符合的對話</div>}
        </>}

        {/* DETAIL */}
        {view==="detail"&&sel&&<div>
          <div style={{background:"#fff",borderRadius:16,padding:"20px",border:"1px solid #ECEAE4",marginBottom:20,borderTop:`4px solid ${CC[sel.category]||"#ddd"}`}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
              <span className="lang-badge" style={{background:sel.lang==="EN"?"#EBF4F1":"#FEF0E8",color:sel.lang==="EN"?"#2E7D6A":"#C87030"}}>{sel.lang}</span>
              <span className="cat-pill" style={{background:CB[sel.category]||"#F0EDEA",color:CC[sel.category]||"#888",fontSize:11,padding:"2px 9px"}}>{sel.category}</span>
              <span style={{fontSize:11,color:"#bbb"}}>{fmt(sel.date)}</span>
            </div>
            <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",lineHeight:1.3}}>{sel.topicJa||sel.topic}</h2>
            {sel.topicJa&&<p style={{margin:0,fontSize:14,color:"#888"}}>{sel.topic}</p>}
            {(sel.tags||[]).length>0&&<div style={{marginTop:10}}>{sel.tags.map(t=><span key={t} className="tag">#{t}</span>)}</div>}
          </div>
          <div className="detail-cols">
            <div>
              <div className="section-title">對話</div>
              {sel.lines.filter(l=>l.ja||l.en).map((l,i)=>(
                <div key={i} className="line-card">
                  {l.sp&&<div className="line-sp">{l.sp}</div>}
                  {l.ja&&<div className="line-ja">{l.ja}</div>}
                  {l.en&&<div className="line-en">{l.en}</div>}
                </div>
              ))}
              <div className="section-title" style={{marginTop:24}}>AI 學習分析</div>
              {!ai&&!aiLoad&&<button onClick={()=>runAI(sel)} style={{width:"100%",background:"#F7F5F0",border:"1px dashed #C8C0B0",borderRadius:12,padding:"14px",fontSize:14,color:"#888"}}>✨ 讓 AI 分析這段對話</button>}
              {aiLoad&&<div style={{textAlign:"center",padding:24,color:"#bbb",fontSize:13}}>🔄 分析中…</div>}
              {ai&&!ai.error&&<>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div className="ai-box" style={{textAlign:"center"}}><div className="ai-label">程度</div><div style={{fontSize:22,fontWeight:700,color:"#C87030"}}>{ai.level}</div></div>
                  <div className="ai-box" style={{textAlign:"center"}}><div className="ai-label">難度</div><div style={{fontSize:18}}>{"⭐".repeat(ai.difficulty||1)}</div></div>
                </div>
                <div className="ai-box"><div className="ai-label">主要文法</div>{(ai.mainGrammar||[]).map((g,i)=><div key={i} style={{fontSize:13,color:"#333",padding:"3px 0",lineHeight:1.6}}>• {g}</div>)}</div>
                <div className="ai-box"><div className="ai-label">文化背景</div><div style={{fontSize:13,color:"#666",lineHeight:1.7}}>{ai.culturalNotes}</div></div>
                <div className="ai-box"><div className="ai-label">學習建議</div>{(ai.studyTips||[]).map((t,i)=><div key={i} style={{fontSize:13,color:"#333",padding:"3px 0",lineHeight:1.6}}>💡 {t}</div>)}</div>
              </>}
              {ai?.error&&<div style={{color:"#C04040",fontSize:13,padding:12}}>{ai.error}</div>}
            </div>
            <div>
              <div className="section-title">重點句型</div>
              {sel.keyPoints.map((kp,i)=>(
                <div key={i} className="kp-card">
                  {kp.ja&&<div className="kp-main">{kp.ja}</div>}
                  <div className="kp-en">{kp.en}</div>
                  {kp.note&&<div className="kp-note">💡 {kp.note}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* STUDY */}
        {view==="study"&&<div>
          <h2 style={{fontSize:18,fontWeight:700,marginBottom:4}}>練習模式</h2>
          <p style={{fontSize:12,color:"#bbb",marginBottom:16}}>點擊遮罩揭露答案</p>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {[["all","全部顯示"],["hide-en","遮英文"],["hide-ja","遮日文"]].map(([m,l])=>(
              <button key={m} className={"filter-pill"+(study===m?" active":"")} onClick={()=>{setStudy(m);setRev({});}}>{l}</button>
            ))}
          </div>
          {entries.map(entry=>(
            <div key={entry.id} style={{marginBottom:24}}>
              <div style={{fontSize:12,color:"#888",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:CC[entry.category]||"#ddd",display:"inline-block"}}/>
                <span style={{fontWeight:600}}>{entry.topicJa||entry.topic}</span>
                <span className="lang-badge" style={{background:entry.lang==="EN"?"#EBF4F1":"#FEF0E8",color:entry.lang==="EN"?"#2E7D6A":"#C87030"}}>{entry.lang}</span>
              </div>
              {entry.lines.filter(l=>l.ja||l.en).map((line,i)=>{
                const k=`${entry.id}-${i}`;
                const ke=`en-${k}`;
                return <div key={i} className="line-card">
                  {line.sp&&<div className="line-sp">{line.sp}</div>}
                  {line.ja&&(study==="hide-ja"
                    ?<div onClick={()=>toggle(k)}>{rev[k]?<span className="line-ja">{line.ja}</span>:<span className="hidden-ja">{line.ja}</span>}{!rev[k]&&<div className="study-hint">點擊顯示日文</div>}</div>
                    :<div className="line-ja">{line.ja}</div>)}
                  {line.en&&(study==="hide-en"
                    ?<div onClick={()=>toggle(ke)}>{rev[ke]?<span className="line-en">{line.en}</span>:<span className="hidden-en">{line.en}</span>}{!rev[ke]&&<div className="study-hint">點擊顯示英文</div>}</div>
                    :<div className="line-en">{line.en}</div>)}
                </div>;
              })}
            </div>
          ))}
        </div>}

        {/* ADD */}
        {view==="add"&&<div>
          <h2 style={{fontSize:18,fontWeight:700,marginBottom:18}}>新增對話</h2>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:8}}>
              {[["EN","English"],["JA","日本語"]].map(([v,l])=>(
                <button key={v} onClick={()=>setForm(p=>({...p,lang:v}))} style={{flex:1,padding:10,borderRadius:10,border:`2px solid ${form.lang===v?(v==="EN"?"#2E7D6A":"#C87030"):"#E0DDD6"}`,background:form.lang===v?(v==="EN"?"#EBF4F1":"#FEF0E8"):"#fff",color:form.lang===v?(v==="EN"?"#2E7D6A":"#C87030"):"#bbb",fontWeight:form.lang===v?700:400,fontSize:14}}>{l}</button>
              ))}
            </div>
            <div className="grid-2">
              <div><label style={LS}>主題（中文）</label><input className="inp" value={form.topicJa} onChange={e=>setForm(p=>({...p,topicJa:e.target.value}))} placeholder="例: 飯店 Check-in"/></div>
              <div><label style={LS}>Topic (EN)</label><input className="inp" value={form.topic} onChange={e=>setForm(p=>({...p,topic:e.target.value}))} placeholder="e.g. Hotel Check-in"/></div>
            </div>
            <div className="grid-2">
              <div><label style={LS}>日期</label><input type="date" className="inp" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
              <div><label style={LS}>類別</label><select className="inp" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{CATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
            </div>
            <div>
              <label style={LS}>對話內容</label>
              {form.lines.map((line,i)=>(
                <div key={i} className="form-line">
                  <input className="inp" value={line.sp} onChange={e=>{const l=[...form.lines];l[i].sp=e.target.value;setForm(p=>({...p,lines:l}))}} placeholder="誰說"/>
                  <input className="inp" value={line.ja} onChange={e=>{const l=[...form.lines];l[i].ja=e.target.value;setForm(p=>({...p,lines:l}))}} placeholder="日文"/>
                  <input className="inp" value={line.en} onChange={e=>{const l=[...form.lines];l[i].en=e.target.value;setForm(p=>({...p,lines:l}))}} placeholder="English"/>
                </div>
              ))}
              <button onClick={()=>setForm(p=>({...p,lines:[...p.lines,{sp:"",ja:"",en:""}]}))} style={AB}>+ 新增一行</button>
            </div>
            <div>
              <label style={LS}>重點句型</label>
              {form.keyPoints.map((kp,i)=>(
                <div key={i} className="kp-row" style={{marginBottom:6}}>
                  <input className="inp" value={kp.ja} onChange={e=>{const k=[...form.keyPoints];k[i].ja=e.target.value;setForm(p=>({...p,keyPoints:k}))}} placeholder="日文"/>
                  <input className="inp" value={kp.en} onChange={e=>{const k=[...form.keyPoints];k[i].en=e.target.value;setForm(p=>({...p,keyPoints:k}))}} placeholder="English"/>
                  <input className="inp" value={kp.note} onChange={e=>{const k=[...form.keyPoints];k[i].note=e.target.value;setForm(p=>({...p,keyPoints:k}))}} placeholder="說明" style={{gridColumn:"1/-1"}}/>
                </div>
              ))}
              <button onClick={()=>setForm(p=>({...p,keyPoints:[...p.keyPoints,{ja:"",en:"",note:""}]}))} style={AB}>+ 新增句型</button>
            </div>
            <div><label style={LS}>標籤（逗號分隔）</label><input className="inp" value={form.tags} onChange={e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="travel, keigo, daily life"/></div>
            <button className="save-btn" onClick={addEntry}>儲存對話</button>
          </div>
        </div>}

      </div>
    </div>
  );
}

const LS={fontSize:10,color:"#bbb",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1};
const AB={width:"100%",background:"none",border:"1px dashed #E0DDD6",borderRadius:8,padding:"8px",fontSize:12,color:"#bbb",cursor:"pointer",marginTop:2};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
