<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>日英 Dialogue Journal</title>
  <defs>
    <filter id="s" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="#1A1A1A"/>

  <!-- Japanese speech bubble (upper-left, orange) -->
  <!-- Rounded rect: x=40,y=40 to x=310,y=240 (rx=36), tail points lower-left -->
  <path filter="url(#s)" fill="#C87030"
    d="M76,40 H274 Q310,40 310,76 V204 Q310,240 274,240 H130 L50,290 L80,240 H76 Q40,240 40,204 V76 Q40,40 76,40 Z"/>

  <!-- 日 character (center of orange bubble: 175, 140) -->
  <text x="175" y="142"
    font-family="Georgia,'Noto Serif TC','Hiragino Mincho ProN',serif"
    font-size="130" font-weight="bold"
    fill="rgba(255,255,255,0.95)"
    text-anchor="middle" dominant-baseline="central">日</text>

  <!-- English speech bubble (lower-right, green) -->
  <!-- Rounded rect: x=202,y=220 to x=472,y=420 (rx=36), tail points lower-right -->
  <path filter="url(#s)" fill="#2E7D6A"
    d="M238,220 H436 Q472,220 472,256 V384 Q472,420 436,420 H432 L462,465 L402,420 H238 Q202,420 202,384 V256 Q202,220 238,220 Z"/>

  <!-- EN text (center of green bubble: 337, 320) -->
  <text x="337" y="322"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="90" font-weight="900"
    fill="rgba(255,255,255,0.95)"
    text-anchor="middle" dominant-baseline="central">EN</text>
</svg>
